motion_interface:
  ros__parameters:
    robot_plugin: "franka"
    robot_hostname: "192.168.18.1"
    base_frame: "panda_link0"
    end_effector_frame: "panda_hand"
    fusion_alpha: 1.0 # Weight for fusing human and PF velocities, 1.0 means only PF velocity is used
    limits:
      v_lin_max: 0.20 # m/s
      v_ang_max: 0.80 # rad/s
      a_lin_max: 0.40 # m/s^2
      a_ang_max: 1.60 # rad/s^2